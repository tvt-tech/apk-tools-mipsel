name: Build

on:
  release:
    types: [published]
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup toolchain and build dependencies
        run: |
          source ./ci.sh
          ci_setup

      - name: Build apk-tools (mipsel-musl, static)
        run: ./build-mipsel-musl.sh

      - name: Verify static linkage
        run: |
          source ./ci.sh
          ci_verify_static_musl

      - name: Smoke test under qemu-user
        run: |
          source ./ci.sh
          ci_run_smoke_test_musl

      - name: Extract version and rename artifact
        id: version
        run: |
          source ./ci.sh
          ci_extract_version_musl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ steps.version.outputs.apk_arch }}-${{ steps.version.outputs.apk_version }}
          path: ${{ steps.version.outputs.apk_path }}

  gnu-device:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup toolchain and build dependencies
        run: |
          source ./ci.sh
          ci_setup

      - name: Build apk-tools (mipsel-gnu, device-patched)
        run: ./build-mipsel-gnu.sh

      - name: Verify device patches (interpreter/rpath)
        run: |
          source ./ci.sh
          ci_verify_patched_gnu

      - name: Extract version and rename artifact
        id: version
        run: |
          source ./ci.sh
          ci_extract_version_gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ steps.version.outputs.apk_arch }}-${{ steps.version.outputs.apk_version }}
          path: ${{ steps.version.outputs.apk_path }}
